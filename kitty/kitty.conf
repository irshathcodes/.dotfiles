kitty_mod super

allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

font_family      Hack Nerd Font Mono
font_size        20.0

cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
pixel_scroll yes

# Repaint cap: default 10ms = ~100fps, just under this 120Hz panel. 8ms lets
# continuous scrolling hit the full 120fps. Costs a little GPU only while actively
# scrolling/animating; nothing when the screen is idle.
repaint_delay 8


initial_window_width  100c
initial_window_height 30c
remember_window_size  yes
window_padding_width  6 6 0 6
modify_font cell_height 120%

hide_window_decorations titlebar-only
macos_show_window_title_in none
macos_option_as_alt yes


tab_bar_style custom
tab_bar_filter session:. or session:^$
tab_title_template "{index}. {fmt.fg.tab}{title}"

enable_audio_bell no

scrollback_pager nvim --cmd 'let g:open_mode = 1' --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'set nomodified readonly nolist' +'TermHl' +'$' -

scrollback_lines 10000
tab_bar_min_tabs 1


# mappings start
map kitty_mod+shift+, load_config_file 

map --new-mode tmux_mode --on-action end kitty_mod+j 
map --mode tmux_mode esc pop_keyboard_mode
map --mode tmux_mode p goto_session ~/.local/state/kittymux/px-ui.kitty-session
map --mode tmux_mode f goto_session ~/.config/kitty/sessions/frontend.kitty-session 
map --mode tmux_mode c goto_session ~/.config/kitty/sessions/candidate-app.kitty-session
map --mode tmux_mode a goto_session ~/.config/kitty/sessions/av-events.kitty-session
map --mode tmux_mode k goto_session ~/.config/kitty/sessions/kanbased.kitty-session
map --mode tmux_mode n goto_session ~/.config/kitty/sessions/spend-management.kitty-session
map --mode tmux_mode g goto_session ~/.config/kitty/sessions/gql.kitty-session
map --mode tmux_mode d goto_session ~/.config/kitty/sessions/default.kitty-session
map --mode tmux_mode r goto_session ~/.config/kitty/sessions/rp.kitty-session
map --mode tmux_mode x goto_session ~/.config/kitty/sessions/xandi.kitty-session
map --mode tmux_mode b goto_session ~/.config/kitty/sessions/buildkit.kitty-session
map --mode tmux_mode \ goto_session --sort-by=alphabetical
map --mode tmux_mode [ goto_session -1
map --mode tmux_mode ] goto_session -1
map --mode tmux_mode s save_as_session --relocatable --use-foreground-process --match=session:. .
map --mode tmux_mode v save_as_session --use-foreground-process --base-dir ~/.config/kitty/sessions

map --mode tmux_mode / kitten ~/.dotfiles/kitty/picker.py sessions
map --mode tmux_mode o kitten ~/.dotfiles/kitty/new_session.py

# cmd+j is the single leader for opening project sessions (projects live remote now).
startup_session ~/.config/kitty/sessions/default.kitty-session

# --- kittymux: context-aware new/close/save on the real keys ---
# Remote (cs/zmx) pane -> zmx-aware (create/kill the session + re-save layout);
# local pane -> native kitty behavior. zmx is touched only via these shortcuts,
# never when kitty closes, so sessions persist unless you explicitly kill them.
map kitty_mod+enter    launch --type=background ~/.config/kitty/kittymux.sh split
map kitty_mod+t        launch --type=background ~/.config/kitty/kittymux.sh tab
map kitty_mod+shift+w  launch --type=background ~/.config/kitty/kittymux.sh close-pane
map kitty_mod+w        launch --type=background ~/.config/kitty/kittymux.sh close-tab
map kitty_mod+shift+s  launch --type=background ~/.config/kitty/kittymux.sh save
map kitty_mod+shift+p  launch --type=overlay    ~/.config/kitty/kittymux.sh prune
map kitty_mod+k command_palette
map --new-mode layout_mode --on-action end kitty_mod+l
map --mode layout_mode esc pop_keyboard_mode
# Each layout change also re-saves the active project's session, so switching
# layout at runtime persists (kittymux save is a no-op on local panes).
map --mode layout_mode v combine : goto_layout vertical : launch --type=background ~/.config/kitty/kittymux.sh save
map --mode layout_mode h combine : goto_layout horizontal : launch --type=background ~/.config/kitty/kittymux.sh save
map --mode layout_mode g combine : goto_layout grid : launch --type=background ~/.config/kitty/kittymux.sh save
map --mode layout_mode t combine : goto_layout tall : launch --type=background ~/.config/kitty/kittymux.sh save
map --mode layout_mode s combine : goto_layout stack : launch --type=background ~/.config/kitty/kittymux.sh save
map kitty_mod+shift+l combine : toggle_layout stack : launch --type=background ~/.config/kitty/kittymux.sh save
map kitty_mod+shift+t kitten ~/.dotfiles/kitty/picker.py splits
map kitty_mod+shift+o focus_visible_window
# cmd+shift+w is kittymux close-pane (defined in the kittymux block above)
# toggle the Claude agent panel as a right-side split in the active tab
map kitty_mod+a kitten ~/.dotfiles/kitty/agent_panel_toggle.py


map --new-mode scroll_mode --on-unknown end kitty_mod+shift+.
map --mode scroll_mode esc pop_keyboard_mode

map --mode scroll_mode k scroll_line_up 
map --mode scroll_mode j scroll_line_down

map kitty_mod+h show_scrollback
map super+right send_text all \x05
map super+left send_text all \x01
map super+backspace send_text all \x15
map --mode tmux_mode , set_tab_title
map super+1 goto_tab 1
map super+2 goto_tab 2
map super+3 goto_tab 3
map super+4 goto_tab 4
map super+5 goto_tab 5
map super+6 goto_tab 6
map super+7 goto_tab 7
map super+8 goto_tab 8
# always go to the last tab 
map super+9 goto_tab 100
map shift+enter send_text all \x1b\r
# mappings end


include current-theme.conf
